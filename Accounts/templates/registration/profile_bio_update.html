{% extends 'Accounts/base.html' %}
{% block title %}Update your profile bio{% endblock %}
{% load crispy_forms_tags %}
{% block content %}
<div class="content">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{form|crispy}}
    <button type="submit" class="btn btn-success">Update</button>
  </form>
</div>
{% endblock %}
