{% extends 'Accounts/base.html' %}

{% block content %}
  <h1>Reset Password</h1>
  <p>Enter your email address below. A link to reset your password will be send. Please, check your spam box</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send email</button>
  </form>
{% endblock %}
